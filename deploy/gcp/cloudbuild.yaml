steps:
    - name: gcr.io/cloud-builders/docker
      id: Build auth image
      args:
          - build
          - -f
          - docker/auth.Dockerfile
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/auth:${_TAG}
          - .

    - name: gcr.io/cloud-builders/docker
      id: Build gameservice image
      args:
          - build
          - -f
          - docker/gameservice.Dockerfile
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gameservice:${_TAG}
          - .

    - name: gcr.io/cloud-builders/docker
      id: Build matchmaking image
      args:
          - build
          - -f
          - docker/matchmaking.Dockerfile
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/matchmaking:${_TAG}
          - .

    - name: gcr.io/cloud-builders/docker
      id: Build frontend image
      args:
          - build
          - -f
          - docker/frontend.Dockerfile
          - --build-arg
          - NEXT_PUBLIC_API_BASE=${_API_BASE}
          - --build-arg
          - NEXT_PUBLIC_WS_URL=${_WS_URL}
          - --build-arg
          - NEXT_PUBLIC_AUTH_BASE=${_AUTH_BASE}
          - --build-arg
          - NEXT_PUBLIC_MATCHMAKING_BASE=${_MATCHMAKING_BASE}
          - -t
          - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${_TAG}
          - .

images:
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/auth:${_TAG}
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/gameservice:${_TAG}
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/matchmaking:${_TAG}
    - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/frontend:${_TAG}

substitutions:
    _REGION: europe-west1
    _REPO: nachalo-repo
    _TAG: latest
    _API_BASE: https://gameservice-REPLACE.a.run.app
    _WS_URL: wss://gameservice-REPLACE.a.run.app/ws
    _AUTH_BASE: https://auth-REPLACE.a.run.app
    _MATCHMAKING_BASE: https://matchmaking-REPLACE.a.run.app
